name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: traceloop
          POSTGRES_PASSWORD: traceloop_dev
          POSTGRES_DB: traceloop
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U traceloop"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://traceloop:traceloop_dev@localhost:5432/traceloop
          REDIS_URL: redis://localhost:6379/0
          DEBUG: "true"
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing -v

      - name: Run ruff lint
        run: ruff check .

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t traceloopci/traceloop-ci:${{ github.sha }} .
