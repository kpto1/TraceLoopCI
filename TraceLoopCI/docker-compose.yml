services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: traceloop-db
    environment:
      POSTGRES_USER: traceloop
      POSTGRES_PASSWORD: traceloop_dev
      POSTGRES_DB: traceloop
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traceloop"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: traceloop-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: traceloop-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://traceloop:traceloop_dev@postgres:5432/traceloop
      REDIS_URL: redis://redis:6379/0
      SERVER_PORT: "8000"
      DEBUG: "true"
      MOCK_LLM_URL: http://mock-llm:9876
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  mock-llm:
    build: .
    container_name: traceloop-mock-llm
    ports:
      - "9876:9876"
    environment:
      MOCK_LLM_PORT: "9876"
    command: uvicorn app.services.mock_llm:app --host 0.0.0.0 --port 9876

volumes:
  pgdata:
