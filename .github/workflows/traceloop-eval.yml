name: TraceLoop CI Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install httpx

      - name: Trigger TraceLoop CI eval
        id: eval
        env:
          TRACELOOP_API_URL: ${{ secrets.TRACELOOP_API_URL }}
          TRACELOOP_API_KEY: ${{ secrets.TRACELOOP_API_KEY }}
          TRACELOOP_DATASET_ID: ${{ secrets.TRACELOOP_DATASET_ID }}
        run: |
          python -c "
          import httpx, json, os, sys
          url = os.environ['TRACELOOP_API_URL']
          key = os.environ['TRACELOOP_API_KEY']
          ds = os.environ['TRACELOOP_DATASET_ID']
          resp = httpx.post(f'{url}/v1/eval/run', json={
              'dataset_id': int(ds), 'model': 'deepseek-chat', 'is_baseline': False
          }, headers={'X-API-Key': key}, timeout=600)
          data = resp.json()
          print(json.dumps(data, indent=2))
          with open('eval_report.json', 'w') as f:
              json.dump(data, f)
          if data.get('overall_score', 100) < 80:
              print('FAIL: overall_score below 80')
              sys.exit(1)
          print(f'OK: score={data[\"overall_score\"]}% ({data[\"passed\"]}/{data[\"total_cases\"]} passed)')
          "

      - name: Post PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report;
            try {
              report = JSON.parse(fs.readFileSync('eval_report.json', 'utf8'));
            } catch (e) {
              report = { error: 'No eval report generated' };
            }

            const score = report.overall_score || 0;
            const passed = report.passed || 0;
            const failed = report.failed || 0;
            const total = report.total_cases || 0;
            const emoji = score >= 90 ? '🟢' : (score >= 80 ? '🟡' : '🔴');

            const body = [
              '## 🔍 TraceLoop CI 评测报告',
              '',
              '| 指标 | 数值 |',
              '|------|------|',
              `| 综合得分 | ${emoji} **${score}%** |`,
              `| 通过 / 失败 | ${passed} / ${failed} (共 ${total} 条) |`,
            ];

            if (report.total_cost != null) {
              body.push(`| 总成本 | $${report.total_cost.toFixed(6)} |`);
            }
            if (report.p95_latency_ms != null) {
              body.push(`| P95 延迟 | ${report.p95_latency_ms}ms |`);
            }

            if (failed > 0 && report.per_case) {
              body.push('', '### ❌ 失败用例', '');
              for (const c of report.per_case) {
                if (!c.overall_passed) {
                  body.push(`- **#${c.case_id}** ${c.input_text || '(empty)'} — ${c.error || 'evaluation failed'}`);
                }
              }
            }

            body.push(
              '',
              '---',
              `🤖 Generated by [TraceLoop CI](https://github.com/${context.repo.owner}/${context.repo.repo})`
            );

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body.join('\n'),
            });

            if (score < 80) {
              core.setFailed(`Eval score ${score}% is below threshold (80%)`);
            }
